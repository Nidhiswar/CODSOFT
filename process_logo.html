<!DOCTYPE html>
<html>

<body>
    <canvas id="canvas" width="512" height="512"></canvas>
    <div id="output"></div>
    <script>
        const ctx = document.getElementById('canvas').getContext('2d');
        const img = new Image();
        img.onload = function () {
            const size = 512;
            const aspect = img.width / img.height;
            let drawWidth, drawHeight;

            if (aspect > 1) { // Wide
                drawWidth = size;
                drawHeight = size / aspect;
            } else { // Tall or Square
                drawHeight = size;
                drawWidth = size * aspect;
            }

            const x = (size - drawWidth) / 2;
            const y = (size - drawHeight) / 2;

            ctx.clearRect(0, 0, size, size);
            ctx.drawImage(img, x, y, drawWidth, drawHeight);

            const base64 = document.getElementById('canvas').toDataURL('image/png');
            document.getElementById('output').innerText = base64;
            console.log("DONE_PROCESSING");
        };
        // Using a placeholder or I can inject the base64 later
        img.src = 'novel-exporters-hub-main/src/assets/novel-logo-final.png';
    </script>
</body>

</html>
